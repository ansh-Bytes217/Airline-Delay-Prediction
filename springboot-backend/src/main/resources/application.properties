# Server Configuration
server.port=8080

# CORS Configuration
spring.mvc.cors.allowed-origins=*

python.ml.service.url=${PYTHON_ML_SERVICE_URL:http://127.0.0.1:8090}

# Logging Configuration
logging.level.com.skypredict.backend=INFO
